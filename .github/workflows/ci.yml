name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        # All three OSes. `stream=True` now works on Windows too, for a
        # file-path source: Rust creates the pipe (`std::io::pipe`) and the read
        # end is adopted with `msvcrt`. A bytes/stream source raises
        # NotImplementedError there. POSIX-only tests (those using `resource` or
        # `/dev/fd`) skip on Windows; the Windows job is where the
        # `#[cfg(windows)]` code first compiles and runs for real.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          # The floor the package declares. abi3 means one wheel covers every
          # later version, so testing the floor is what tells us the floor holds.
          python-version: "3.11"

      - name: rust fmt
        run: cargo fmt --all --check
      - name: rust clippy
        run: cargo clippy --all-targets -- -D warnings

      # Installed, not built in place: this is the path a user takes, and it is
      # the only one that proves the wheel's own metadata and layout are right.
      - name: install the package
        run: pip install .
      - name: install the checkers
        run: pip install pytest mypy ruff

      - name: tests
        run: pytest tests -q
      - name: types
        run: mypy
      - name: lint
        run: ruff check python tests
